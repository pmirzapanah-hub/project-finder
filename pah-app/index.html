<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Finder</title>

<style>
body { font-family: Arial; margin:0; padding:20px; background:#f5f5f5; }
.container { max-width:1000px; margin:auto; }
input, button, select { padding:10px; margin:5px 0; width:100%; }
button { cursor:pointer; }
.list { background:#fff; padding:10px; border-radius:8px; }
.item { padding:8px; border-bottom:1px solid #ddd; }
</style>
</head>

<body>
<div class="container">

<h2>Project Finder</h2>

<!-- SETTINGS -->
<h3>Settings</h3>
<input id="basePath" placeholder="Base Folder (e.g. Jobs)" />
<button onclick="saveSettings()">Save Settings</button>

<!-- NEW PROJECT -->
<h3>New Project</h3>
<input id="projectName" placeholder="Project Name" />
<button onclick="createProject()">Create Project</button>

<!-- SEARCH -->
<h3>Search</h3>
<input id="search" placeholder="Search projects..." oninput="filterFinder(this.value)" />

<!-- LIST -->
<div class="list" id="projectList"></div>

</div>

<script>

const S = {
  token: null,
  settings: JSON.parse(localStorage.getItem('settings') || '{}'),
  finderProjects: [],
  filteredFinder: []
};

// =====================
// UTIL
// =====================
function toast(msg){
  console.log(msg);
  alert(msg);
}

async function gFetch(url, method='GET', body){
  if(!S.token) throw new Error('No token');

  const res = await fetch('https://graph.microsoft.com/v1.0'+url, {
    method,
    headers: {
      'Authorization': 'Bearer ' + S.token,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  });

  if(!res.ok){
    const txt = await res.text();
    throw new Error(txt);
  }

  return res.json();
}

// =====================
// SETTINGS
// =====================
function saveSettings(){
  const basePath = document.getElementById('basePath').value.trim();
  if(!basePath) return toast('Enter base path');

  S.settings.basePath = basePath;
  localStorage.setItem('settings', JSON.stringify(S.settings));
  toast('Saved');
}

// =====================
// CREATE PROJECT
// =====================
async function createProject(){
  try{
    const name = document.getElementById('projectName').value.trim();
    if(!name) return toast('Enter project name');

    const basePath = S.settings.basePath || 'Jobs';

    console.log('TOKEN:', S.token);
    console.log('BASEPATH:', basePath);

    // get or create base folder
    let parentId;

    try{
      const parent = await gFetch(`/me/drive/root:/${encodeURIComponent(basePath)}`);
      parentId = parent.id;
    }catch(e){
      const root = await gFetch('/me/drive/root');
      const created = await gFetch(`/me/drive/items/${root.id}/children`, 'POST', {
        name: basePath,
        folder: {}
      });
      parentId = created.id;
    }

    // create project folder
    await gFetch(`/me/drive/items/${parentId}/children`, 'POST', {
      name: name,
      folder: {}
    });

    toast('Project created');
    loadProjects();

  }catch(e){
    console.error(e);
    alert('FULL ERROR:\n' + e.message);
  }
}

// =====================
// LOAD PROJECTS
// =====================
async function loadProjects(){
  try{
    const basePath = S.settings.basePath || 'Jobs';

    const res = await gFetch(`/me/drive/root:/${encodeURIComponent(basePath)}:/children`);

    S.finderProjects = (res.value || [])
      .filter(f => f.folder)
      .map(f => ({ name: f.name }));

    S.filteredFinder = [...S.finderProjects];
    renderList();

  }catch(e){
    console.error(e);
    toast('Failed loading projects');
  }
}

// =====================
// SEARCH
// =====================
function filterFinder(q){
  const s = q.toLowerCase();

  S.filteredFinder = s
    ? S.finderProjects.filter(p => p.name.toLowerCase().includes(s))
    : [...S.finderProjects];

  renderList();
}

// =====================
// RENDER
// =====================
function renderList(){
  const el = document.getElementById('projectList');
  el.innerHTML = '';

  S.filteredFinder.forEach(p => {
    const div = document.createElement('div');
    div.className = 'item';
    div.textContent = p.name;
    el.appendChild(div);
  });
}

// =====================
// INIT
// =====================
(function(){
  document.getElementById('basePath').value = S.settings.basePath || 'Jobs';
})();

</script>

</body>
</html>
